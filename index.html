<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaforma | AI Heritage Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@300..700&display=swap"
        rel="stylesheet">
        <link rel="icon" type="image/svg+xml" href="/favicon.svg">
        <style>
        /* Font Fallbacks & Local Assets for PDF Generation */
        @font-face {
            font-family: 'Space Grotesk Local';
            src: local('Space Grotesk'), local('SpaceGrotesk-Regular');
        }
        @font-face {
            font-family: 'Playfair Display Local';
            src: local('Playfair Display'), local('PlayfairDisplay-Italic');
            font-style: italic;
        }

        :root {
            --bg-light: #ffffff;
            --bg-dark: #030303;
            --accent: #FF660F;

            /* Fluid Typography & Spacing Scaling */
            /* Using clamp(min, preferred, max) for seamless transitions */
            --fluid-h1: clamp(2.8rem, 8vw + 1rem, 8rem);
            --fluid-h2: clamp(2.2rem, 5vw + 1rem, 5rem);
            --fluid-h3: clamp(1.8rem, 3vw + 1rem, 3.5rem);
            --fluid-p: clamp(1rem, 0.5vw + 0.5rem, 1.25rem);
            --fluid-sm: clamp(1rem, 0.3vw + 0.7rem, 1.15rem);
        }

        @media (max-height: 800px) {
            :root {
                --fluid-h1: clamp(2rem, 12vh + 0.5rem, 4.5rem);
                --fluid-h2: clamp(1.5rem, 8vh + 0.5rem, 3rem);
                --fluid-h3: clamp(1.2rem, 6vh + 0.5rem, 2rem);
                --fluid-p: clamp(0.75rem, 3vh + 0.2rem, 0.95rem);
                --fluid-sm: clamp(0.65rem, 2vh + 0.1rem, 0.8rem);
            }
        }

        @media (max-height: 550px) {
            :root {
                --fluid-h1: clamp(1.8rem, 15vh, 3.5rem);
                --fluid-h2: clamp(1.4rem, 10vh, 2.5rem);
                --fluid-h3: clamp(1.1rem, 8vh, 1.8rem);
                --fluid-p: clamp(0.7rem, 4vh, 0.85rem);
            }
        }

        html {
            scroll-padding-top: 80px;
            scroll-behavior: smooth;
        }

        @media (max-height: 700px) {
            html {
                scroll-padding-top: 60px;
            }
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow-x: hidden;
            transition: background-color 1s ease;
            -webkit-font-smoothing: antialiased;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .font-heading {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.02em;
        }

        /* Fluid Utility Classes */
        .text-fluid-h1 {
            font-size: var(--fluid-h1);
            line-height: 0.9;
        }

        .text-fluid-h2 {
            font-size: var(--fluid-h2);
            line-height: 1.1;
        }

        .text-fluid-h3 {
            font-size: var(--fluid-h3);
            line-height: 1.2;
        }

        .text-fluid-p {
            font-size: var(--fluid-p);
        }

        .text-fluid-sm {
            font-size: var(--fluid-sm);
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .glass-morphism-dark {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Responsive Container Adjustment */
        @media (max-height: 700px) {
            .snap-start {
                scroll-snap-align: none !important;
            }
        }

        /* Hide legacy artifacts causing square glitch */
        .light-leak,
        .noise-overlay {
            display: none !important;
        }

        /* Structural Text Styling */
        .architectural-title {
            letter-spacing: -0.05em;
            line-height: 0.85;
        }

        /* Custom scrollbar for premium feel */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF660F;
            border-radius: 10px;
        }

        /* Print Styles for PDF Portfolio Export */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0; /* Full bleed capability */
            }

            html, body {
                width: 210mm;
                height: 297mm;
                overflow: visible !important;
                background: white !important;
                color: #030303 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            body {
                font-family: 'Inter', system-ui, sans-serif !important;
            }

            .font-heading {
                font-family: 'Space Grotesk', 'Space Grotesk Local', sans-serif !important;
                color: #030303 !important;
            }

            .font-serif {
                font-family: 'Playfair Display', 'Playfair Display Local', serif !important;
            }

            .no-print,
            nav,
            .fixed.top-0, /* Navbar */
            .fixed.bottom-0, /* Chat */
            button,
            iframe,
            .light-leak,
            .noise-overlay {
                display: none !important;
            }

            #root {
                display: block !important;
                background: white !important;
            }

            /* Content Flow for Portfolio */
            section {
                page-break-after: always;
                page-break-inside: avoid;
                break-inside: avoid;
                position: relative !important;
                display: block !important;
                background: white !important;
                color: black !important;
                min-height: auto !important;
                padding: 2cm !important;
            }

            /* Adjust Hero for PDF */
            .architectural-title {
                color: #030303 !important;
                font-size: 48pt !important;
                line-height: 1 !important;
                margin-bottom: 24pt !important;
            }

            /* Ensure portfolio images are high quality and visible */
            img {
                max-width: 100% !important;
                page-break-inside: avoid;
                filter: none !important;
                -webkit-filter: none !important;
            }

            .grid {
                display: block !important;
            }

            .grid > div {
                margin-bottom: 2cm !important;
                page-break-inside: avoid;
            }

            /* Layout Polish */
            .border-white\/5, .border-white\/10, .border-black\/5 {
                border-color: #f0f0f0 !important;
            }

            .text-white { color: #030303 !important; }
            .text-white\/40, .text-white\/50, .text-white\/60, .text-stone-500 { color: #666 !important; }
            .text-\[\#FF660F\] { color: #FF660F !important; }
            
            .shadow-2xl, .shadow-xl, .shadow-lg, .shadow-md {
                box-shadow: none !important;
                border: 1px solid #eee !important;
            }

            /* Reset container widths */
            .max-w-7xl, .max-w-4xl, .max-w-\[1600px\] {
                max-width: 100% !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}
</script>

</head>

<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
